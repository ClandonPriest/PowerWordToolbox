name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from TOC
        id: version
        run: |
          VERSION=$(grep "^## Version:" PowerWordToolbox.toc | sed 's/## Version:[[:space:]]*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if release already exists
        id: check_release
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release v${{ steps.version.outputs.version }} already exists, skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release zip
        if: steps.check_release.outputs.exists == 'false'
        run: |
          mkdir -p release/PowerWordToolbox
          cp -r Core Modules Options release/PowerWordToolbox/
          cp PowerWordToolbox.toc release/PowerWordToolbox/
          cd release
          zip -r "../PowerWordToolbox-v${{ steps.version.outputs.version }}.zip" PowerWordToolbox/

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: PowerWordToolbox v${{ steps.version.outputs.version }}
          files: PowerWordToolbox-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
